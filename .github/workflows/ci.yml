name: CI

on:
  push:
    branches: [main]
  pull_request:

# contents:write = la CI pousse ses logs sur des branches ci-logs-* en cas
# d'échec, pour qu'ils soient lisibles publiquement (diagnostic à distance).
# Le push réutilise les identifiants persistés par actions/checkout.
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check 2>&1 | tee fmt.log
      - name: Clippy (warnings = erreurs)
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee clippy.log
      - name: Tests
        run: |
          set -o pipefail
          cargo test --workspace 2>&1 | tee tests.log
      - name: Publier les logs en cas d'échec
        if: failure()
        run: |
          git config user.email "ci@toolbox" && git config user.name "CI"
          git checkout -q --orphan ci-logs-check
          git rm -rfq --cached .
          echo "run $GITHUB_RUN_ID commit $GITHUB_SHA" > run.txt
          for f in run.txt fmt.log clippy.log tests.log; do if [ -f "$f" ]; then git add -f "$f"; fi; done
          git commit -qm "logs check $GITHUB_RUN_ID"
          git push -f origin ci-logs-check

  # Vérifie que ça compile pour les Pi (ARM64) sans exécuter.
  check-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Check aarch64
        run: |
          set -o pipefail
          cargo check --workspace --target aarch64-unknown-linux-gnu 2>&1 | tee arm64.log
      - name: Publier les logs en cas d'échec
        if: failure()
        run: |
          git config user.email "ci@toolbox" && git config user.name "CI"
          git checkout -q --orphan ci-logs-arm64
          git rm -rfq --cached .
          echo "run $GITHUB_RUN_ID commit $GITHUB_SHA" > run.txt
          for f in run.txt arm64.log; do if [ -f "$f" ]; then git add -f "$f"; fi; done
          git commit -qm "logs arm64 $GITHUB_RUN_ID"
          git push -f origin ci-logs-arm64

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck des scripts
        run: |
          set -o pipefail
          sudo apt-get install -y shellcheck 2>&1 | tee apt.log
          shellcheck tools/bench/*.sh 2>&1 | tee sc.log
      - name: Publier les logs en cas d'échec
        if: failure()
        run: |
          git config user.email "ci@toolbox" && git config user.name "CI"
          git checkout -q --orphan ci-logs-shellcheck
          git rm -rfq --cached .
          echo "run $GITHUB_RUN_ID commit $GITHUB_SHA" > run.txt
          for f in run.txt apt.log sc.log; do if [ -f "$f" ]; then git add -f "$f"; fi; done
          git commit -qm "logs shellcheck $GITHUB_RUN_ID"
          git push -f origin ci-logs-shellcheck
