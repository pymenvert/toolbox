name: CI

on:
  push:
    branches: [main]
  pull_request:

# Principe de moindre privilège : par DÉFAUT lecture seule. Seuls les jobs
# qui poussent leurs logs (branches ci-logs-*) reçoivent `contents: write`,
# et uniquement au moment du push (identifiants NON persistés pendant les
# étapes cargo, où tourne du code tiers — build.rs des dépendances, tests).
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Dépendances système (ALSA pour le MIDI)
        run: |
          set -o pipefail
          sudo apt-get update 2>&1 | tail -1
          sudo apt-get install -y libasound2-dev 2>&1 | tail -1
      - name: Format
        run: cargo fmt --all --check 2>&1 | tee fmt.log
      - name: Clippy (warnings = erreurs)
        run: |
          set -o pipefail
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee clippy.log
      - name: Tests
        run: |
          set -o pipefail
          cargo test --workspace 2>&1 | tee tests.log
      - name: Smoke test (binaire réel, API vivante)
        run: |
          set -o pipefail
          cargo build -p toolbox-node 2>&1 | tail -1
          bash deploy/smoke.sh target/debug/toolbox-node 2>&1 | tee smoke.log
      - name: Publier les logs en cas d'échec
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "ci@toolbox" && git config user.name "CI"
          git checkout -q --orphan ci-logs-check
          git rm -rfq --cached .
          echo "run $GITHUB_RUN_ID commit $GITHUB_SHA" > run.txt
          for f in run.txt fmt.log clippy.log tests.log smoke.log; do if [ -f "$f" ]; then git add -f "$f"; fi; done
          git commit -qm "logs check $GITHUB_RUN_ID"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-logs-check

  # Multi-plateforme : mêmes tests sous Windows (cible desktop de Pym).
  check-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Tests (Windows)
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace 2>&1 | tee windows.log
      - name: Smoke test (binaire réel, API vivante)
        shell: bash
        run: |
          set -o pipefail
          cargo build -p toolbox-node 2>&1 | tail -1
          bash deploy/smoke.sh target/debug/toolbox-node.exe 2>&1 | tee smoke.log
      - name: Publier les logs en cas d'échec
        if: failure()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "ci@toolbox" && git config user.name "CI"
          git checkout -q --orphan ci-logs-windows
          git rm -rfq --cached .
          echo "run $GITHUB_RUN_ID commit $GITHUB_SHA" > run.txt
          for f in run.txt windows.log smoke.log; do if [ -f "$f" ]; then git add -f "$f"; fi; done
          git commit -qm "logs windows $GITHUB_RUN_ID"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-logs-windows

  # Vérifie que ça compile pour les Pi (ARM64) sans exécuter.
  # --no-default-features : le MIDI (ALSA) demande les libs système ARM,
  # il est vérifié en natif par les autres jobs. Idem toolbox-render
  # (fenêtre desktop) : le Pi aura sa chaîne vidéo GStreamer/DRM dédiée.
  check-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Check aarch64
        run: |
          set -o pipefail
          cargo check --workspace --exclude toolbox-control-midi --exclude toolbox-render \
            --no-default-features \
            --target aarch64-unknown-linux-gnu 2>&1 | tee arm64.log
      - name: Publier les logs en cas d'échec
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "ci@toolbox" && git config user.name "CI"
          git checkout -q --orphan ci-logs-arm64
          git rm -rfq --cached .
          echo "run $GITHUB_RUN_ID commit $GITHUB_SHA" > run.txt
          for f in run.txt arm64.log; do if [ -f "$f" ]; then git add -f "$f"; fi; done
          git commit -qm "logs arm64 $GITHUB_RUN_ID"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-logs-arm64

  # Backend vidéo : compile et teste la feature `gstreamer` avec les libs
  # système (le job principal vérifie le workspace SANS cette feature).
  check-gstreamer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Dépendances système (GStreamer dev + plugins + rtsp-server)
        run: |
          set -o pipefail
          sudo apt-get update 2>&1 | tail -1
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly gstreamer1.0-plugins-bad \
            libgstrtspserver-1.0-dev 2>&1 | tail -1
      - name: Clippy + tests + check node (feature gstreamer)
        run: |
          set -o pipefail
          cargo clippy -p toolbox-gst --features gstreamer --all-targets -- -D warnings 2>&1 | tee gst.log
          cargo test -p toolbox-gst --features gstreamer 2>&1 | tee -a gst.log
          # --no-default-features : ni ALSA ni winit ici, seul le câblage
          # gstreamer du node est vérifié (le reste l'est par le job check).
          cargo check -p toolbox-node --no-default-features --features gstreamer 2>&1 | tee -a gst.log
      - name: Publier les logs en cas d'échec
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "ci@toolbox" && git config user.name "CI"
          git checkout -q --orphan ci-logs-gstreamer
          git rm -rfq --cached .
          echo "run $GITHUB_RUN_ID commit $GITHUB_SHA" > run.txt
          for f in run.txt gst.log; do if [ -f "$f" ]; then git add -f "$f"; fi; done
          git commit -qm "logs gstreamer $GITHUB_RUN_ID"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-logs-gstreamer

  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Shellcheck des scripts
        run: |
          set -o pipefail
          sudo apt-get install -y shellcheck 2>&1 | tee apt.log
          shellcheck tools/bench/*.sh deploy/*.sh 2>&1 | tee sc.log
      - name: Publier les logs en cas d'échec
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "ci@toolbox" && git config user.name "CI"
          git checkout -q --orphan ci-logs-shellcheck
          git rm -rfq --cached .
          echo "run $GITHUB_RUN_ID commit $GITHUB_SHA" > run.txt
          for f in run.txt apt.log sc.log; do if [ -f "$f" ]; then git add -f "$f"; fi; done
          git commit -qm "logs shellcheck $GITHUB_RUN_ID"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-logs-shellcheck

  # Binaires téléchargeables depuis l'onglet Actions (login GitHub requis) :
  # toolbox-node pour Linux x64, Windows x64 et Raspberry Pi (ARM64).
  build-artifacts:
    needs: [check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: toolbox-node-linux-x64
            binary: target/release/toolbox-node
          - os: windows-latest
            artifact: toolbox-node-windows-x64
            binary: target/release/toolbox-node.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dépendances système (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build release
        shell: bash
        run: cargo build --release -p toolbox-node
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  # Binaire Windows avec le backend vidéo, en PACK AUTONOME : les DLL et
  # plugins GStreamer sont livrés dans le zip à côté de l'exe — dézipper et
  # double-cliquer, aucune installation requise (continue-on-error : la
  # chaîne chocolatey reste plus fragile que le reste de la CI).
  build-windows-gstreamer:
    needs: [check]
    runs-on: windows-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: GStreamer MSVC (dev + runtime) + pkg-config
        shell: bash
        run: |
          set -o pipefail
          # pkgconfiglite : les paquets GStreamer MSVC n'embarquent pas
          # pkg-config.exe, requis par les crates *-sys.
          choco install -y gstreamer gstreamer-devel pkgconfiglite --no-progress 2>&1 | tail -5 | tee gstwin.log
      - name: Build release (feature gstreamer)
        shell: bash
        run: |
          set -o pipefail
          # L'emplacement du MSI varie selon les versions : on le cherche.
          # (`|| true` : sous set -e, une substitution qui echoue tue le step.)
          GST=$(ls -d /c/gstreamer/1.0/msvc_x86_64 "/c/Program Files/gstreamer/1.0/msvc_x86_64" 2>/dev/null | head -1 || true)
          if [ -z "$GST" ]; then
            GST=$(find /c -maxdepth 4 -type d -name "msvc_x86_64" -path "*gstreamer*" 2>/dev/null | head -1 || true)
          fi
          echo "dossier GStreamer : ${GST:-INTROUVABLE}" | tee -a gstwin.log
          [ -n "$GST" ]
          export PATH="$GST/bin:$PATH"
          export PKG_CONFIG_PATH="$GST/lib/pkgconfig"
          pkg-config --version 2>&1 | tee -a gstwin.log
          pkg-config --modversion gstreamer-1.0 2>&1 | tee -a gstwin.log
          cargo build --release -p toolbox-node --features gstreamer 2>&1 | tee -a gstwin.log
          # Pack autonome : exe + DLL GStreamer + plugins (détectés par le
          # node via lib/gstreamer-1.0 à côté de l'exe).
          mkdir -p dist/lib
          cp target/release/toolbox-node.exe dist/
          cp deploy/run-portable.bat dist/
          cp "$GST"/bin/*.dll dist/
          cp -r "$GST"/lib/gstreamer-1.0 dist/lib/
          rm -f dist/lib/gstreamer-1.0/*.pdb 2>/dev/null || true
          # gstpython exige un runtime Python qu'on n'embarque pas : retiré
          # (sinon warning « module introuvable » à chaque démarrage).
          rm -f dist/lib/gstreamer-1.0/gstpython.dll
          du -sh dist 2>&1 | tee -a gstwin.log
      - uses: actions/upload-artifact@v4
        with:
          name: toolbox-node-windows-x64-gstreamer
          path: dist
          if-no-files-found: error
      - name: Publier les logs en cas d'échec
        if: failure()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "ci@toolbox" && git config user.name "CI"
          git checkout -q --orphan ci-logs-gstwin
          git rm -rfq --cached .
          echo "run $GITHUB_RUN_ID commit $GITHUB_SHA" > run.txt
          for f in run.txt gstwin.log; do if [ -f "$f" ]; then git add -f "$f"; fi; done
          git commit -qm "logs gstwin $GITHUB_RUN_ID"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-logs-gstwin

  build-arm64:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Linker croisé ARM64
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release ARM64 (sans MIDI — ALSA croisé indisponible)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p toolbox-node --no-default-features --target aarch64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: toolbox-node-raspberrypi-arm64
          path: target/aarch64-unknown-linux-gnu/release/toolbox-node
          if-no-files-found: error
